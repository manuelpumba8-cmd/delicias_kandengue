        }

        body::before {

            right: -20%;

            height: 600px;

            border-radius: 50%;
            z-index: 0;
            animation: floatBg 25s ease-in-out infinite;
        }

        body::after {
            content: '';

            bottom: -40%;
            left: -20%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(192, 57, 43, 0.04) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 0;
            animation: floatBg 30s ease-in-out infinite reverse;

        @keyframes floatBg {

                transform: translate(0, 0) scale(1);
            }
            25% {
                transform: translate(-30px, 20px) scale(1.05);
            }
            50% {

           CONTAINER
        ========================================== */

            max-width: 440px;

            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            z-index: 1;

<body>

    <div class="register-container">

        <!-- ==========================================

        <div class="logo">

        <form id="registerForm" onsubmit="register(event)">

            <div class="form-group">

                <div class="input-wrapper">
                    <input type="text" id="fullName" placeholder="Seu nome completo" required autocomplete="name">
                    <i class="bi bi-person input-icon"></i>
                </div>
            </div>

            <!-- Email -->
            <div class="form-group">
                <label for="email">Endereço de Email <span class="required">*</span></label>
                <div class="input-wrapper">
                    <input type="email" id="email" placeholder="seu@email.com" required autocomplete="email">
                    <i class="bi bi-envelope input-icon"></i>

            <!-- Senha -->
            <div class="form-group">
                <label for="password">Senha <span class="required">*</span></label>
                <div class="input-wrapper">
                    <input type="password" id="password" placeholder="Mínimo 6 caracteres" required minlength="6" autocomplete="new-password">
                    <i class="bi bi-lock input-icon"></i>
                    <button type="button" class="toggle-password" onclick="togglePassword()" aria-label="Mostrar senha">
                        <i class="bi bi-eye" id="toggleIcon"></i>

                </div>

                <!-- Requisitos da senha -->
                <div class="password-requirements" id="passwordRequirements">
                    <div class="req" id="reqLength">
                        <i class="bi bi-x-circle"></i> Mínimo 6 caracteres
                    </div>
                    <div class="req" id="reqLetter">
                        <i class="bi bi-x-circle"></i> Pelo menos uma letra
                    </div>
                    <div class="req" id="reqNumber">
                        <i class="bi bi-x-circle"></i> Pelo menos um número
                    </div>
                </div>

            <!-- Confirmar Senha -->

                    <i class="bi bi-check-circle input-icon"></i>
                </div>

            <!-- Termos -->
            <div class="terms">
                <input type="checkbox" id="termsCheckbox" required>
                <label for="termsCheckbox">

    <script>
        // ==========================================
        // TOGGLE PASSWORD
        // ==========================================
        function togglePassword() {
            const input = document.getElementById('password');
            const icon = document.getElementById('toggleIcon');

            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'bi bi-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'bi bi-eye';
            }
        }

        // ==========================================
        // VALIDAÇÃO DE SENHA EM TEMPO REAL
        // ==========================================
        const passwordInput = document.getElementById('password');
        const reqContainer = document.getElementById('passwordRequirements');

        passwordInput.addEventListener('focus', function() {
            reqContainer.classList.add('show');
        });

        passwordInput.addEventListener('blur', function() {
            if (!this.value) {
                reqContainer.classList.remove('show');
            }
        });

        passwordInput.addEventListener('input', function() {
            const value = this.value;
            const length = document.getElementById('reqLength');
            const letter = document.getElementById('reqLetter');
            const number = document.getElementById('reqNumber');

            // Verificar comprimento
            if (value.length >= 6) {
                length.className = 'req valid';
                length.innerHTML = '<i class="bi bi-check-circle"></i> Mínimo 6 caracteres';
            } else {
                length.className = 'req invalid';
                length.innerHTML = '<i class="bi bi-x-circle"></i> Mínimo 6 caracteres';
            }

            // Verificar letra
            if (/[a-zA-Z]/.test(value)) {
                letter.className = 'req valid';
                letter.innerHTML = '<i class="bi bi-check-circle"></i> Pelo menos uma letra';
            } else {
                letter.className = 'req invalid';
                letter.innerHTML = '<i class="bi bi-x-circle"></i> Pelo menos uma letra';
            }

            // Verificar número
            if (/\d/.test(value)) {
                number.className = 'req valid';
                number.innerHTML = '<i class="bi bi-check-circle"></i> Pelo menos um número';
            } else {
                number.className = 'req invalid';
                number.innerHTML = '<i class="bi bi-x-circle"></i> Pelo menos um número';
            }

            reqContainer.classList.add('show');
        });

        // ==========================================
        // SHOW LOADING
        // ==========================================
        function setLoading(loading) {
            const btn = document.getElementById('registerBtn');
            if (loading) {
                btn.classList.add('loading');
                btn.disabled = true;
            } else {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        }

        // ==========================================
        // SHOW ALERT
        // ==========================================
        function showAlert(message, type = 'info') {
            const container = document.getElementById('alertContainer');
            container.innerHTML = '';

            const alert = document.createElement('div');
            alert.className = `alert-custom alert-${type}`;

            const icons = {
                success: '✅',
                danger: '❌',
                warning: '⚠️',
                info: 'ℹ️'
            };

            alert.innerHTML = `
                        <span style="font-size:1.2rem;">${icons[type] || 'ℹ️'}</span>
                        <span>${message}</span>
                        <span class="close-alert" onclick="this.parentElement.remove()">✕</span>
                    `;

            container.appendChild(alert);

            setTimeout(() => {
                if (alert.parentElement) {
                    alert.style.opacity = '0';
                    alert.style.transform = 'translateY(-10px)';
                    setTimeout(() => alert.remove(), 300);
                }
            }, 6000);
        }

        // ==========================================
        // 🔥 REGISTO COM EMAIL/SENHA
        // ==========================================
        function register(event) {
            event.preventDefault();

            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const termsChecked = document.getElementById('termsCheckbox').checked;

            // ==========================================
            // VALIDAÇÕES
            // ==========================================
            if (!fullName) {
                showAlert('Por favor, insira o seu nome completo.', 'warning');
                document.getElementById('fullName').focus();
                return;
            }

            if (fullName.length < 3) {
                showAlert('O nome deve ter pelo menos 3 caracteres.', 'warning');
                document.getElementById('fullName').focus();
                return;
            }

            if (!email) {
                showAlert('Por favor, insira o seu email.', 'warning');
                document.getElementById('email').focus();
                return;
            }

            if (!email.includes('@') || !email.includes('.')) {
                showAlert('Por favor, insira um email válido.', 'warning');
                document.getElementById('email').focus();
                return;
            }

            if (!password) {
                showAlert('Por favor, insira uma senha.', 'warning');
                document.getElementById('password').focus();
                return;
            }

            if (password.length < 6) {
                showAlert('A senha deve ter pelo menos 6 caracteres.', 'warning');
                document.getElementById('password').focus();
                return;
            }

            if (!/[a-zA-Z]/.test(password)) {
                showAlert('A senha deve conter pelo menos uma letra.', 'warning');
                document.getElementById('password').focus();
                return;
            }

            if (!/\d/.test(password)) {
                showAlert('A senha deve conter pelo menos um número.', 'warning');
                document.getElementById('password').focus();
                return;
            }

            if (password !== confirmPassword) {
                showAlert('As senhas não coincidem.', 'warning');
                document.getElementById('confirmPassword').focus();
                return;
            }

            if (!termsChecked) {
                showAlert('Por favor, aceite os Termos de Serviço.', 'warning');
                document.getElementById('termsCheckbox').focus();
                return;
            }

            // ==========================================
            // CRIAR CONTA
            // ==========================================
            setLoading(true);

            auth.createUserWithEmailAndPassword(email, password)
                .then((result) => {
                    const user = result.user;

                    // Atualizar perfil com nome
                    return user.updateProfile({
                        displayName: fullName
                    }).then(() => {
                        // Salvar dados no Realtime Database
                        return database.ref('users/' + user.uid).set({
                            name: fullName,
                            email: email,
                            createdAt: firebase.database.ServerValue.TIMESTAMP,
                            provider: 'email'
                        });
                    });
                })
                .then(() => {
                    setLoading(false);
                    showAlert('✅ Conta criada com sucesso!', 'success');

                    // Enviar email de verificação (opcional)
                    auth.currentUser.sendEmailVerification().catch(() => {});

                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                })
                .catch(error => {
                    setLoading(false);
                    let message = 'Erro ao criar conta.';

                    switch (error.code) {
                        case 'auth/email-already-in-use':
                            message = 'Este email já está registado. Faça login ou use outro email.';
                            break;
                        case 'auth/invalid-email':
                            message = 'Email inválido.';
                            break;
                        case 'auth/weak-password':
                            message = 'A senha é muito fraca. Use pelo menos 6 caracteres.';
                            break;
                        case 'auth/operation-not-supported-in-this-environment':
                            message = '⚠️ Use um servidor local (Live Server) para registar.';
                            break;
                        default:
                            message = error.message;
                    }

                    showAlert('❌ ' + message, 'danger');
                });
        }

        // ==========================================
        // 🔥 REGISTO COM GOOGLE
        // ==========================================
        function registerGoogle() {
            showAlert('A abrir janela do Google...', 'info');

            const provider = new firebase.auth.GoogleAuthProvider();
            provider.setCustomParameters({
                prompt: 'select_account'
            });

            auth.signInWithPopup(provider)
                .then((result) => {
                    const user = result.user;

                    // Salvar dados no Realtime Database
                    return database.ref('users/' + user.uid).set({
                        name: user.displayName || 'Utilizador',
                        email: user.email,
                        photoURL: user.photoURL || '',
                        createdAt: firebase.database.ServerValue.TIMESTAMP,
                        provider: 'google'
                    });
                })
                .then(() => {
                    showAlert('✅ Conta criada com Google!', 'success');

                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                })
                .catch(error => {
                    if (error.code === 'auth/popup-closed-by-user') {
                        showAlert('Janela de login fechada.', 'info');
                    } else if (error.code === 'auth/cancelled-popup-request') {
                        showAlert('Registo cancelado.', 'info');
                    } else if (error.code === 'auth/operation-not-supported-in-this-environment') {
                        showAlert('⚠️ Use um servidor local (Live Server) para registar com Google.', 'warning');
                    } else {
                        showAlert('❌ ' + error.message, 'danger');
                    }
                });
        }

        // ==========================================
        // VERIFICAR SE JÁ ESTÁ LOGADO
        // ==========================================
        try {
            auth.onAuthStateChanged(user => {
                if (user) {
                    window.location.href = 'index.html';
                }
            });
        } catch (e) {
            console.warn('⚠️ Erro ao verificar estado:', e.message);
        }

        // ==========================================
        // DETECTAR ENTER PARA SUBMETER
        // ==========================================
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const form = document.getElementById('registerForm');
                const active = document.activeElement;
                if (form.contains(active)) {
                    form.dispatchEvent(new Event('submit'));
                }
            }
        });

        // ==========================================
        // VALIDAÇÃO DE CONFIRMAÇÃO DE SENHA
        // ==========================================
        document.getElementById('confirmPassword').addEventListener('input', function() {
            const password = document.getElementById('password').value;
            const confirm = this.value;

            if (confirm && password !== confirm) {
                this.style.borderColor = '#e74c3c';
            } else if (confirm && password === confirm) {
                this.style.borderColor = '#27ae60';
            } else {
                this.style.borderColor = '';
            }
        });
    </script>
