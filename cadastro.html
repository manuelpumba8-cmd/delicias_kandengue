<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js">
    </script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCIt7yIRQb8_MeXmVrnpQCCQUD5uXGhvNU",
            authDomain: "delicias-91228.firebaseapp.com",
            databaseURL: "https://delicias-91228-default-rtdb.firebaseio.com",
            projectId: "delicias-91228",
            storageBucket: "delicias-91228.firebasestorage.app",
            messagingSenderId: "163923093683",
            appId: "1:163923093683:web:82660c6097ecca35dda8c6",
            measurementId: "G-3JF00F4X1G"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
        console.log('Firebase inicializado');
    </script>

    <script src="https://www.google.com/recaptcha/api.js" async defer>
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #f5f6f8;
            padding: 20px;
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .container {
            display: flex;
            width: 900px;
            min-height: 550px;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            animation: slideUp 0.9s ease-in-out;
            transition: box-shadow 0.4s ease-in-out, transform 0.4s ease-in-out;
        }

        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .container:hover {
            box-shadow: 0 0 35px rgba(0, 0, 0, 0.15);
            transform: translateY(-5px);
        }

        .image-side {
            flex: 1;
            background: url('media/imagens/angola.png') no-repeat center center/cover;
            animation: fadeInImage 1.2s ease-in-out;
            min-height: 300px;
        }

        @keyframes fadeInImage {
            from {
                opacity: 0;
                transform: scale(1.05);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .form-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            background: #fff;
            animation: fadeInForm 1.4s ease-in-out;
        }

        @keyframes fadeInForm {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .form-side h2 {
            font-size: 28px;
            color: #1e293b;
            margin-bottom: 30px;
            animation: fadeDown 0.8s ease-in-out;
        }

        @keyframes fadeDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .input-group {
            width: 100%;
            max-width: 320px;
            margin-bottom: 20px;
            position: relative;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            outline: none;
            font-size: 15px;
            transition: all 0.3s;
        }

        .input-group input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 8px rgba(99, 102, 241, 0.3);
            transform: scale(1.02);
        }

        .input-group input.error {
            border-color: #e74c3c;
        }

        .input-group input.success {
            border-color: #27ae60;
        }

        .btn-register {
            width: 100%;
            max-width: 320px;
            padding: 12px;
            background-color: #1e293b;
            color: white;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease-in-out;
            position: relative;
        }

        .btn-register:hover:not(:disabled) {
            background-color: #334155;
            transform: scale(1.03);
            box-shadow: 0 0 12px rgba(30, 41, 59, 0.3);
        }

        .btn-register:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .btn-register .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        .btn-register.loading .btn-text {
            display: none;
        }

        .btn-register.loading .spinner {
            display: block;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .btn-google {
            width: 100%;
            max-width: 320px;
            padding: 10px;
            background-color: #fff;
            color: #1e293b;
            font-weight: 600;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-google:hover {
            background-color: #f8f9fa;
            border-color: #6366f1;
            transform: scale(1.02);
        }

        .btn-google .google-icon {
            width: 20px;
            height: 20px;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 15px;
            width: 100%;
            max-width: 320px;
            margin: 15px 0;
            color: #64748b;
            font-size: 13px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e2e8f0;
        }

        .footer-text {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
            color: #64748b;
            animation: fadeDown 1.2s ease-in-out;
        }

        .footer-text a {
            color: #6366f1;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .footer-text a:hover {
            color: #4f46e5;
            text-decoration: underline;
        }

        .alert-container {
            width: 100%;
            max-width: 320px;
            margin-bottom: 15px;
        }

        .alert-custom {
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideDown 0.3s ease;
        }

        .alert-custom .close-alert {
            cursor: pointer;
            margin-left: auto;
            font-weight: 700;
            opacity: 0.6;
        }

        .alert-custom .close-alert:hover {
            opacity: 1;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #b7dfb9;
        }

        .alert-danger {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffdfa7;
        }

        .alert-info {
            background: #e9ecef;
            color: #2c3e50;
            border: 1px solid #d5d8dc;
        }

        .password-requirements {
            max-width: 320px;
            width: 100%;
            margin-top: -10px;
            margin-bottom: 15px;
            padding: 8px 12px;
            background: #f8f9fa;
            border-radius: 8px;
            font-size: 12px;
            display: none;
        }

        .password-requirements.show {
            display: block;
        }

        .password-requirements .req {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 2px 0;
            color: #6c757d;
            transition: color 0.3s ease;
        }

        .password-requirements .req.valid {
            color: #27ae60;
        }

        .password-requirements .req.invalid {
            color: #e74c3c;
        }

        .password-requirements .req i {
            font-size: 14px;
        }

        .recaptcha-container {
            max-width: 320px;
            width: 100%;
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
        }

        .recaptcha-error {
            color: #e74c3c;
            font-size: 12px;
            display: none;
            text-align: center;
            width: 100%;
            max-width: 320px;
            margin-top: 5px;
        }

        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.85);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 15px;
        }

        .loading-overlay .spinner-large {
            width: 50px;
            height: 50px;
            border: 4px solid #e9ecef;
            border-top-color: #f1c40f;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .loading-overlay.show {
            display: flex;
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                width: 90%;
                height: auto;
            }
            .image-side {
                height: 200px;
            }
            .form-side {
                padding: 30px 20px;
            }
            .form-side h2 {
                font-size: 22px;
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner-large"></div>
        <p style="color: #1a1a2e; font-weight: 500;">A processar...</p>
    </div>

    <div class="container">
        <div class="image-side"></div>

        <div class="form-side">
            <h2>CADASTRO</h2>

            <div class="alert-container" id="alertContainer"></div>

            <form id="registerForm" onsubmit="register(event)">
                <div class="input-group">
                    <input type="text" id="fullName" placeholder="Nome Completo" required autocomplete="name">
                </div>
                <div class="input-group">
                    <input type="email" id="email" placeholder="E-mail" required autocomplete="email">
                </div>
                <div class="input-group">
                    <input type="password" id="password" placeholder="Senha" required minlength="6" autocomplete="new-password">
                </div>

                <div class="password-requirements" id="passwordRequirements">
                    <div class="req" id="reqLength">
                        <i class="bi bi-x-circle"></i> Minimo 6 caracteres
                    </div>
                    <div class="req" id="reqLetter">
                        <i class="bi bi-x-circle"></i> Pelo menos uma letra
                    </div>
                    <div class="req" id="reqNumber">
                        <i class="bi bi-x-circle"></i> Pelo menos um numero
                    </div>
                </div>

                <div class="input-group">
                    <input type="password" id="confirmPassword" placeholder="Confirmar Senha" required autocomplete="new-password">
                </div>

                <div class="recaptcha-container">
                    <div class="g-recaptcha" data-sitekey="6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI"></div>
                </div>
                <div class="recaptcha-error" id="recaptchaError">Por favor, confirme que nao e um robo.</div>

                <button type="submit" class="btn-register" id="registerBtn">
                    <span class="btn-text">Registrar</span>
                    <span class="spinner"></span>
                </button>
            </form>

            <div class="divider">ou</div>

            <button class="btn-google" onclick="registerGoogle()">
                <svg class="google-icon" viewBox="0 0 48 48">
                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                </svg>
                Registrar com Google
            </button>

            <div class="footer-text">
                <p>Ja tem uma conta? <a href="login.html">Fazer login</a></p>
            </div>
        </div>
    </div>

    <script>
        var recaptchaResolved = false;

        function onRecaptchaResolved() {
            recaptchaResolved = true;
            document.getElementById('recaptchaError').style.display = 'none';
        }

        function validateRecaptcha() {
            var response = grecaptcha.getResponse();
            if (response.length === 0) {
                document.getElementById('recaptchaError').style.display = 'block';
                return false;
            }
            document.getElementById('recaptchaError').style.display = 'none';
            return true;
        }

        const passwordInput = document.getElementById('password');
        const reqContainer = document.getElementById('passwordRequirements');

        passwordInput.addEventListener('focus', function() {
            reqContainer.classList.add('show');
        });

        passwordInput.addEventListener('blur', function() {
            if (!this.value) {
                reqContainer.classList.remove('show');
            }
        });

        passwordInput.addEventListener('input', function() {
            const value = this.value;
            const length = document.getElementById('reqLength');
            const letter = document.getElementById('reqLetter');
            const number = document.getElementById('reqNumber');

            if (value.length >= 6) {
                length.className = 'req valid';
                length.innerHTML = 'Minimo 6 caracteres';
            } else {
                length.className = 'req invalid';
                length.innerHTML = 'Minimo 6 caracteres';
            }

            if (/[a-zA-Z]/.test(value)) {
                letter.className = 'req valid';
                letter.innerHTML = 'Pelo menos uma letra';
            } else {
                letter.className = 'req invalid';
                letter.innerHTML = 'Pelo menos uma letra';
            }

            if (/\d/.test(value)) {
                number.className = 'req valid';
                number.innerHTML = 'Pelo menos um numero';
            } else {
                number.className = 'req invalid';
                number.innerHTML = 'Pelo menos um numero';
            }

            reqContainer.classList.add('show');
        });

        document.getElementById('confirmPassword').addEventListener('input', function() {
            const password = document.getElementById('password').value;
            const confirm = this.value;

            if (confirm && password !== confirm) {
                this.style.borderColor = '#e74c3c';
                this.classList.remove('success');
                this.classList.add('error');
            } else if (confirm && password === confirm) {
                this.style.borderColor = '#27ae60';
                this.classList.remove('error');
                this.classList.add('success');
            } else {
                this.style.borderColor = '#cbd5e1';
                this.classList.remove('error', 'success');
            }
        });

        function setLoading(loading) {
            const btn = document.getElementById('registerBtn');
            if (loading) {
                btn.classList.add('loading');
                btn.disabled = true;
                document.getElementById('loadingOverlay').classList.add('show');
            } else {
                btn.classList.remove('loading');
                btn.disabled = false;
                document.getElementById('loadingOverlay').classList.remove('show');
            }
        }

        function showAlert(message, type) {
            const container = document.getElementById('alertContainer');
            container.innerHTML = '';

            const alert = document.createElement('div');
            alert.className = 'alert-custom alert-' + type;

            const icons = {
                success: '',
                danger: '',
                warning: '',
                info: ''
            };

            alert.innerHTML = `
                        <span>${icons[type] || ''}</span>
                        <span>${message}</span>
                        <span class="close-alert" onclick="this.parentElement.remove()">X</span>
                    `;

            container.appendChild(alert);

            setTimeout(() => {
                if (alert.parentElement) {
                    alert.style.opacity = '0';
                    alert.style.transform = 'translateY(-10px)';
                    setTimeout(() => alert.remove(), 300);
                }
            }, 6000);
        }

        function register(event) {
            event.preventDefault();

            if (!validateRecaptcha()) {
                return;
            }

            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!fullName || !email || !password || !confirmPassword) {
                showAlert('Preencha todos os campos.', 'warning');
                return;
            }

            if (fullName.length < 3) {
                showAlert('O nome deve ter pelo menos 3 caracteres.', 'warning');
                document.getElementById('fullName').focus();
                return;
            }

            if (!email.includes('@') || !email.includes('.')) {
                showAlert('Insira um email valido.', 'warning');
                document.getElementById('email').focus();
                return;
            }

            if (password.length < 6) {
                showAlert('A senha deve ter pelo menos 6 caracteres.', 'warning');
                document.getElementById('password').focus();
                return;
            }

            if (!/[a-zA-Z]/.test(password)) {
                showAlert('A senha deve conter pelo menos uma letra.', 'warning');
                document.getElementById('password').focus();
                return;
            }

            if (!/\d/.test(password)) {
                showAlert('A senha deve conter pelo menos um numero.', 'warning');
                document.getElementById('password').focus();
                return;
            }

            if (password !== confirmPassword) {
                showAlert('As senhas nao coincidem.', 'warning');
                document.getElementById('confirmPassword').focus();
                return;
            }

            setLoading(true);

            auth.createUserWithEmailAndPassword(email, password)
                .then((result) => {
                    const user = result.user;

                    return user.updateProfile({
                        displayName: fullName
                    }).then(() => {
                        return database.ref('users/' + user.uid).set({
                            name: fullName,
                            email: email,
                            createdAt: firebase.database.ServerValue.TIMESTAMP,
                            provider: 'email',
                            emailVerified: false
                        });
                    });
                })
                .then(() => {
                    return auth.currentUser.sendEmailVerification();
                })
                .then(() => {
                    setLoading(false);
                    showAlert(
                        'Conta criada com sucesso! Enviamos um link de verificacao para o seu email. Por favor, verifique o seu email antes de fazer login.',
                        'success'
                    );
                    grecaptcha.reset();
                    recaptchaResolved = false;
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 4000);
                })
                .catch(error => {
                    setLoading(false);
                    let message = 'Erro ao criar conta.';

                    switch (error.code) {
                        case 'auth/email-already-in-use':
                            message = 'Este email ja esta registado.';
                            break;
                        case 'auth/invalid-email':
                            message = 'Email invalido.';
                            break;
                        case 'auth/weak-password':
                            message = 'A senha e muito fraca.';
                            break;
                        default:
                            message = error.message;
                    }

                    showAlert(message, 'danger');
                    grecaptcha.reset();
                    recaptchaResolved = false;
                });
        }

        function registerGoogle() {
            showAlert('A abrir janela do Google...', 'info');

            const provider = new firebase.auth.GoogleAuthProvider();
            provider.setCustomParameters({
                prompt: 'select_account'
            });

            auth.signInWithPopup(provider)
                .then((result) => {
                    const user = result.user;

                    return database.ref('users/' + user.uid).set({
                        name: user.displayName || 'Utilizador',
                        email: user.email,
                        photoURL: user.photoURL || '',
                        createdAt: firebase.database.ServerValue.TIMESTAMP,
                        provider: 'google',
                        emailVerified: user.emailVerified || false
                    });
                })
                .then(() => {
                    showAlert('Conta criada com Google!', 'success');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                })
                .catch(error => {
                    if (error.code === 'auth/popup-closed-by-user') {
                        showAlert('Janela de login fechada.', 'info');
                    } else if (error.code === 'auth/cancelled-popup-request') {
                        showAlert('Registo cancelado.', 'info');
                    } else {
                        showAlert(error.message, 'danger');
                    }
                });
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                window.location.href = 'index.html';
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const form = document.getElementById('registerForm');
                const active = document.activeElement;
                if (form && form.contains(active)) {
                    form.dispatchEvent(new Event('submit'));
                }
            }
        });
    </script>

</body>
</html>
