<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <!-- ========================================== -->
    <!-- 🔥 FIREBASE SDKs -->
    <!-- ========================================== -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js">
    </script>

    <!-- ========================================== -->
    <!-- 🔥 CONFIGURAÇÃO FIREBASE -->
    <!-- ========================================== -->
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCIt7yIRQb8_MeXmVrnpQCCQUD5uXGhvNU",
            authDomain: "delicias-91228.firebaseapp.com",
            databaseURL: "https://delicias-91228-default-rtdb.firebaseio.com",
            projectId: "delicias-91228",
            storageBucket: "delicias-91228.firebasestorage.app",
            messagingSenderId: "163923093683",
            appId: "1:163923093683:web:82660c6097ecca35dda8c6",
            measurementId: "G-3JF00F4X1G"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
        console.log('🔥 Firebase inicializado!');
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f5f6f8;
            overflow: hidden;
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .container {
            display: flex;
            width: 900px;
            height: 550px;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            animation: slideUp 0.9s ease-in-out;
            transition: box-shadow 0.4s ease-in-out, transform 0.4s ease-in-out;
        }

        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .container:hover {
            box-shadow: 0 0 35px rgba(0, 0, 0, 0.15);
            transform: translateY(-5px);
        }

        .image-side {
            flex: 1;
            background: url('media/imagens/angola.png') no-repeat center center/cover;
            animation: fadeInImage 1.2s ease-in-out;
        }

        @keyframes fadeInImage {
            from {
                opacity: 0;
                transform: scale(1.05);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .form-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            background: #fff;
            animation: fadeInForm 1.4s ease-in-out;
        }

        @keyframes fadeInForm {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .form-side h2 {
            font-size: 28px;
            color: #1e293b;
            margin-bottom: 30px;
            animation: fadeDown 0.8s ease-in-out;
        }

        @keyframes fadeDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .input-group {
            width: 100%;
            max-width: 320px;
            margin-bottom: 20px;
            position: relative;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            outline: none;
            font-size: 15px;
            transition: all 0.3s;
        }

        .input-group input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 8px rgba(99, 102, 241, 0.3);
            transform: scale(1.02);
        }

        .input-group input.error {
            border-color: #e74c3c;
        }

        .input-group input.success {
            border-color: #27ae60;
        }

        /* Botão Login */
        .btn-login {
            width: 100%;
            max-width: 320px;
            padding: 12px;
            background-color: #1e293b;
            color: white;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease-in-out;
            position: relative;
        }

        .btn-login:hover:not(:disabled) {
            background-color: #334155;
            transform: scale(1.03);
            box-shadow: 0 0 12px rgba(30, 41, 59, 0.3);
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn-login .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        .btn-login.loading .btn-text {
            display: none;
        }

        .btn-login.loading .spinner {
            display: block;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Botão Google */
        .btn-google {
            width: 100%;
            max-width: 320px;
            padding: 10px;
            background-color: #fff;
            color: #1e293b;
            font-weight: 600;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-google:hover {
            background-color: #f8f9fa;
            border-color: #6366f1;
            transform: scale(1.02);
        }

        .btn-google .google-icon {
            width: 20px;
            height: 20px;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 15px;
            width: 100%;
            max-width: 320px;
            margin: 15px 0;
            color: #64748b;
            font-size: 13px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e2e8f0;
        }

        .footer-text {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
            color: #64748b;
            animation: fadeDown 1.2s ease-in-out;
        }

        .footer-text a {
            color: #6366f1;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .footer-text a:hover {
            color: #4f46e5;
            text-decoration: underline;
        }

        /* Alertas */
        .alert-container {
            width: 100%;
            max-width: 320px;
            margin-bottom: 15px;
        }

        .alert-custom {
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideDown 0.3s ease;
        }

        .alert-custom .close-alert {
            cursor: pointer;
            margin-left: auto;
            font-weight: 700;
            opacity: 0.6;
        }

        .alert-custom .close-alert:hover {
            opacity: 1;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #b7dfb9;
        }

        .alert-danger {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffdfa7;
        }

        .alert-info {
            background: #e9ecef;
            color: #2c3e50;
            border: 1px solid #d5d8dc;
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                width: 90%;
                height: auto;
            }
            .image-side {
                height: 200px;
            }
            .form-side {
                padding: 30px 20px;
            }
            .form-side h2 {
                font-size: 22px;
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="image-side"></div>

        <div class="form-side">
            <h2>LOGIN</h2>

            <!-- Alert Container -->
            <div class="alert-container" id="alertContainer"></div>

            <!-- Form Login -->
            <form id="loginForm" onsubmit="login(event)">
                <div class="input-group">
                    <input type="email" id="email" placeholder="E-mail" required autocomplete="email">
                </div>
                <div class="input-group">
                    <input type="password" id="password" placeholder="Senha" required minlength="6" autocomplete="current-password">
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    <span class="btn-text">Enviar</span>
                    <span class="spinner"></span>
                </button>
            </form>

            <!-- Divider -->
            <div class="divider">ou</div>

            <!-- Botão Google -->
            <button class="btn-google" onclick="loginGoogle()">
                <svg class="google-icon" viewBox="0 0 48 48">
                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                </svg>
                Entrar com Google
            </button>

            <div class="footer-text">
                <p>Esqueceu a senha? <a href="recuperar.html">Recuperar</a></p>
                <p>Não tem uma conta? <a href="cadastro.html">Criar uma conta</a></p>
            </div>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- SCRIPTS -->
    <!-- ========================================== -->
    <script>
        // ==========================================
        // LOADING STATE
        // ==========================================
        function setLoading(loading) {
            const btn = document.getElementById('loginBtn');
            if (loading) {
                btn.classList.add('loading');
                btn.disabled = true;
            } else {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        }

        // ==========================================
        // SHOW ALERT
        // ==========================================
        function showAlert(message, type = 'info') {
            const container = document.getElementById('alertContainer');
            container.innerHTML = '';

            const alert = document.createElement('div');
            alert.className = `alert-custom alert-${type}`;

            const icons = {
                success: '✅',
                danger: '❌',
                warning: '⚠️',
                info: 'ℹ️'
            };

            alert.innerHTML = `
                        <span>${icons[type] || 'ℹ️'}</span>
                        <span>${message}</span>
                        <span class="close-alert" onclick="this.parentElement.remove()">✕</span>
                    `;

            container.appendChild(alert);

            setTimeout(() => {
                if (alert.parentElement) {
                    alert.style.opacity = '0';
                    alert.style.transform = 'translateY(-10px)';
                    setTimeout(() => alert.remove(), 300);
                }
            }, 6000);
        }

        // ==========================================
        // 🔥 LOGIN COM EMAIL/SENHA
        // ==========================================
        function login(event) {
            event.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            // Validações
            if (!email || !password) {
                showAlert('Por favor, preencha todos os campos.', 'warning');
                return;
            }

            if (!email.includes('@') || !email.includes('.')) {
                showAlert('Por favor, insira um email válido.', 'warning');
                return;
            }

            if (password.length < 6) {
                showAlert('A senha deve ter pelo menos 6 caracteres.', 'warning');
                return;
            }

            setLoading(true);

            auth.signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    setLoading(false);
                    showAlert('✅ Login efetuado com sucesso!', 'success');

                    const user = userCredential.user;

                    // Salvar último login
                    database.ref('users/' + user.uid + '/lastLogin').set({
                        timestamp: firebase.database.ServerValue.TIMESTAMP,
                        email: user.email
                    }).catch(() => {});

                    setTimeout(() => {
                        if (user.email === 'manuelpumba8@gmail.com') {
                            window.location.href = 'dashboard.html';
                        } else {
                            window.location.href = 'index.html';
                        }
                    }, 1200);
                })
                .catch(error => {
                    setLoading(false);
                    let message = 'Erro ao fazer login.';

                    switch (error.code) {
                        case 'auth/user-not-found':
                            message = 'Utilizador não encontrado.';
                            break;
                        case 'auth/wrong-password':
                            message = 'Senha incorreta.';
                            break;
                        case 'auth/invalid-email':
                            message = 'Email inválido.';
                            break;
                        case 'auth/user-disabled':
                            message = 'Conta desativada.';
                            break;
                        case 'auth/too-many-requests':
                            message = 'Muitas tentativas. Tente mais tarde.';
                            break;
                        case 'auth/network-request-failed':
                            message = 'Erro de rede. Verifique sua conexão.';
                            break;
                        default:
                            message = error.message;
                    }

                    showAlert('❌ ' + message, 'danger');
                });
        }

        // ==========================================
        // 🔥 LOGIN COM GOOGLE
        // ==========================================
        function loginGoogle() {
            showAlert('A abrir janela do Google...', 'info');

            const provider = new firebase.auth.GoogleAuthProvider();
            provider.setCustomParameters({
                prompt: 'select_account'
            });

            auth.signInWithPopup(provider)
                .then((result) => {
                    const user = result.user;

                    database.ref('users/' + user.uid).update({
                        name: user.displayName || 'Utilizador',
                        email: user.email,
                        photoURL: user.photoURL || '',
                        lastLogin: firebase.database.ServerValue.TIMESTAMP,
                        provider: 'google'
                    }).catch(() => {});

                    showAlert('✅ Login com Google efetuado!', 'success');

                    setTimeout(() => {
                        if (user.email === 'manuelpumba8@gmail.com') {
                            window.location.href = 'dashboard.html';
                        } else {
                            window.location.href = 'index.html';
                        }
                    }, 1200);
                })
                .catch(error => {
                    if (error.code === 'auth/popup-closed-by-user') {
                        showAlert('Janela de login fechada.', 'info');
                    } else if (error.code === 'auth/cancelled-popup-request') {
                        showAlert('Login cancelado.', 'info');
                    } else {
                        showAlert('❌ ' + error.message, 'danger');
                    }
                });
        }

        // ==========================================
        // VERIFICAR SE JÁ ESTÁ LOGADO
        // ==========================================
        auth.onAuthStateChanged(user => {
            if (user) {
                if (user.email === 'manuelpumba8@gmail.com') {
                    window.location.href = 'dashboard.html';
                } else {
                    window.location.href = 'index.html';
                }
            }
        });

        // ==========================================
        // ENTER PARA SUBMETER
        // ==========================================
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const form = document.getElementById('loginForm');
                const active = document.activeElement;
                if (form && form.contains(active)) {
                    form.dispatchEvent(new Event('submit'));
                }
            }
        });
    </script>

</body>
</html>
