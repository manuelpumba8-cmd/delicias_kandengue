<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Delícias da Kandengue</title>
<link rel="shortcut icon" href="media/imagens/Copilot_20251027_215018.png" type="image/x-icon">
    <!-- ========================================== -->
    <!-- 🔥 FIREBASE SDKs -->
    <!-- ========================================== -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js">
    </script>

    <script>
        // ==========================================
        // 🔧 VERIFICAR AMBIENTE
        // ==========================================
        console.log('📍 Protocolo:', window.location.protocol);
        console.log('📍 Host:', window.location.host);

        // Verificar se é file://
        if (window.location.protocol === 'file:') {
            alert('⚠️ ATENÇÃO: O Firebase não funciona em arquivos locais (file://).\n\n' +
                'Use um servidor local:\n' +
                '1. VS Code Live Server\n' +
                '2. Python: python -m http.server 8080\n' +
                '3. Node.js: npx serve');
        }

        // ==========================================
        // 🔥 CONFIGURAÇÃO FIREBASE
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyCIt7yIRQb8_MeXmVrnpQCCQUD5uXGhvNU",
            authDomain: "delicias-91228.firebaseapp.com",
            databaseURL: "https://delicias-91228-default-rtdb.firebaseio.com",
            projectId: "delicias-91228",
            storageBucket: "delicias-91228.firebasestorage.app",
            messagingSenderId: "163923093683",
            appId: "1:163923093683:web:82660c6097ecca35dda8c6",
            measurementId: "G-3JF00F4X1G"
        };

        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        // ==========================================
        // 🔧 CONFIGURAR PERSISTÊNCIA (COM FALLBACK)
        // ==========================================
        function setupPersistence() {
            // Verificar se estamos num ambiente seguro
            const isSecure = window.location.protocol === 'https:' ||
                window.location.protocol === 'http:' ||
                window.location.hostname === 'localhost' ||
                window.location.hostname === '127.0.0.1';

            if (!isSecure) {
                console.warn('⚠️ Ambiente não seguro, usando persistência NONE');
                return auth.setPersistence(firebase.auth.Auth.Persistence.NONE);
            }

            // Tentar LOCAL primeiro, depois SESSION, depois NONE
            return auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL)
                .catch(() => {
                    console.warn('⚠️ LOCAL não disponível, tentando SESSION');
                    return auth.setPersistence(firebase.auth.Auth.Persistence.SESSION);
                })
                .catch(() => {
                    console.warn('⚠️ SESSION não disponível, usando NONE');
                    return auth.setPersistence(firebase.auth.Auth.Persistence.NONE);
                });
        }

        // Executar configuração
        setupPersistence()
            .then(() => {
                console.log('✅ Persistência configurada com sucesso!');
            })
            .catch((error) => {
                console.warn('⚠️ Erro ao configurar persistência:', error.message);
            });

        // ==========================================
        // FUNÇÃO PARA VERIFICAR SE ESTÁ LOGADO
        // ==========================================
        auth.onAuthStateChanged(user => {
            if (user) {
                // Se já estiver logado, redirecionar
                window.location.href = 'index.html';
            }
        });

        console.log('🔥 Firebase inicializado!');
        console.log('📁 Projeto:', firebaseConfig.projectId);
    </script>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* ==========================================
           ESTILOS (mantidos do código anterior)
        ========================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #faf8f5 0%, #e9ecef 100%);
            padding: 20px;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.08);
            padding: 50px 45px;
            max-width: 440px;
            width: 100%;
            animation: slideUp 0.6s ease;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #f1c40f, #f39c12);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            box-shadow: 0 10px 30px rgba(241, 196, 15, 0.25);
        }

        .logo .logo-icon img {
            width: 45px;
            filter: brightness(0) invert(1);
        }

        .logo h2 {
            font-family: 'Playfair Display', serif;
            color: #1a1a2e;
            font-size: 1.8rem;
        }

        .logo h2 .gold {
            color: #f1c40f;
        }

        .logo p {
            color: #6c757d;
            font-size: 0.95rem;
            margin-top: 5px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            font-weight: 600;
            font-size: 0.85rem;
            color: #1a1a2e;
            display: block;
            margin-bottom: 6px;
        }

        .form-group .input-wrapper {
            position: relative;
        }

        .form-group .input-wrapper input {
            width: 100%;
            padding: 14px 18px 14px 48px;
            border-radius: 14px;
            border: 2px solid #e9ecef;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            background: #faf8f5;
            font-family: 'Poppins', sans-serif;
        }

        .form-group .input-wrapper input:focus {
            border-color: #f1c40f;
            background: #fff;
            box-shadow: 0 0 0 5px rgba(241, 196, 15, 0.08);
            outline: none;
        }

        .form-group .input-wrapper .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #adb5bd;
            font-size: 1.1rem;
        }

        .form-group .input-wrapper .input-icon.active {
            color: #f1c40f;
        }

        .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #adb5bd;
            cursor: pointer;
            font-size: 1.1rem;
            padding: 5px;
        }

        .toggle-password:hover {
            color: #1a1a2e;
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #1a1a2e, #2d2d44);
            color: #fff;
            border: none;
            border-radius: 14px;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            position: relative;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(26, 26, 46, 0.25);
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn-login .spinner {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        .btn-login.loading .btn-text {
            display: none;
        }

        .btn-login.loading .spinner {
            display: block;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .btn-google {
            width: 100%;
            padding: 14px;
            background: #fff;
            color: #333;
            border: 2px solid #e9ecef;
            border-radius: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-family: 'Poppins', sans-serif;
        }

        .btn-google:hover {
            border-color: #f1c40f;
            background: #fffbf0;
            transform: translateY(-2px);
        }

        .btn-google .google-icon {
            width: 24px;
            height: 24px;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 18px;
            margin: 25px 0;
            color: #adb5bd;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e9ecef;
        }

        #alertContainer {
            margin-bottom: 20px;
        }

        .alert-custom {
            padding: 14px 18px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideUp 0.3s ease;
            font-size: 0.9rem;
        }

        .alert-custom .close-alert {
            cursor: pointer;
            margin-left: auto;
            font-weight: 700;
            opacity: 0.6;
            padding: 0 4px;
        }

        .alert-custom .close-alert:hover {
            opacity: 1;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
        }

        .alert-danger {
            background: #f8d7da;
            color: #721c24;
        }

        .alert-warning {
            background: #fff3cd;
            color: #856404;
        }

        .alert-info {
            background: #e9ecef;
            color: #2c3e50;
        }

        .footer-links {
            text-align: center;
            margin-top: 20px;
        }

        .footer-links a {
            color: #6c757d;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .footer-links a:hover {
            color: #f1c40f;
        }

        .footer-links .signup-link {
            color: #1a1a2e;
            font-weight: 600;
        }

        .footer-links .signup-link:hover {
            color: #f1c40f;
        }

        .footer-links .separator {
            color: #dee2e6;
            margin: 0 6px;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 30px 22px;
            }

            .logo .logo-icon {
                width: 65px;
                height: 65px;
            }

            .logo .logo-icon img {
                width: 35px;
            }

            .logo h2 {
                font-size: 1.5rem;
            }

            .form-group .input-wrapper input {
                padding: 12px 14px 12px 44px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

    <div class="login-container">

        <!-- LOGO -->
        <div class="logo">
            <div class="logo-icon">
                <img src="media/imagens/Copilot_20251027_215018.png" alt="Logo">
            </div>
            <h2>Delícias <span class="gold">Kandengue</span></h2>
            <p>Bem-vindo de volta! 👋</p>
        </div>

        <!-- ALERTAS -->
        <div id="alertContainer"></div>

        <!-- FORM LOGIN -->
        <form id="loginForm" onsubmit="login(event)">
            <div class="form-group">
                <label for="email">Email</label>
                <div class="input-wrapper">
                    <input type="email" id="email" placeholder="seu@email.com" required autocomplete="email">
                    <i class="bi bi-envelope input-icon"></i>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Senha</label>
                <div class="input-wrapper">
                    <input type="password" id="password" placeholder="••••••••" required minlength="6" autocomplete="current-password">
                    <i class="bi bi-lock input-icon"></i>
                    <button type="button" class="toggle-password" onclick="togglePassword()">
                        <i class="bi bi-eye" id="toggleIcon"></i>
                    </button>
                </div>
            </div>

            <div class="text-end mb-3">
                <a href="#" class="text-decoration-none" style="color: #f1c40f; font-size: 0.85rem;">Esqueceu a senha?</a>
            </div>

            <button type="submit" class="btn-login" id="loginBtn">
                <span class="btn-text">Entrar</span>
                <span class="spinner"></span>
            </button>
        </form>

        <!-- DIVIDER -->
        <div class="divider">ou continue com</div>

        <!-- GOOGLE -->
        <button onclick="loginGoogle()" class="btn-google">
            <svg class="google-icon" viewBox="0 0 48 48">
                <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
            </svg>
            Entrar com Google
        </button>

        <!-- FOOTER -->
        <div class="footer-links">
            <span>Não tem conta?</span>
            <a href="cadastro.html" class="signup-link">Criar conta →</a>
            <span class="separator">•</span>
            <a href="index.html">
                <i class="bi bi-arrow-left"></i> Voltar
            </a>
        </div>

    </div>

    <script>
        // ==========================================
        // TOGGLE PASSWORD
        // ==========================================
        function togglePassword() {
            const input = document.getElementById('password');
            const icon = document.getElementById('toggleIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'bi bi-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'bi bi-eye';
            }
        }

        // ==========================================
        // LOADING
        // ==========================================
        function setLoading(loading) {
            const btn = document.getElementById('loginBtn');
            if (loading) {
                btn.classList.add('loading');
                btn.disabled = true;
            } else {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        }

        // ==========================================
        // ALERT
        // ==========================================
        function showAlert(message, type = 'info') {
            const container = document.getElementById('alertContainer');
            container.innerHTML = '';
            const alert = document.createElement('div');
            alert.className = `alert-custom alert-${type}`;
            const icons = { success: '✅', danger: '❌', warning: '⚠️', info: 'ℹ️' };
            alert.innerHTML = `
                        <span>${icons[type] || 'ℹ️'}</span>
                        <span>${message}</span>
                        <span class="close-alert" onclick="this.parentElement.remove()">✕</span>
                    `;
            container.appendChild(alert);
            setTimeout(() => {
                if (alert.parentElement) {
                    alert.style.opacity = '0';
                    alert.style.transform = 'translateY(-10px)';
                    setTimeout(() => alert.remove(), 300);
                }
            }, 6000);
        }

        // ==========================================
        // 🔥 LOGIN
        // ==========================================
        function login(event) {
            event.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                showAlert('Por favor, preencha todos os campos.', 'warning');
                return;
            }

            if (password.length < 6) {
                showAlert('A senha deve ter pelo menos 6 caracteres.', 'warning');
                return;
            }

            setLoading(true);

            auth.signInWithEmailAndPassword(email, password)
                .then(() => {
                    setLoading(false);
                    showAlert('✅ Login efetuado com sucesso!', 'success');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1200);
                })
                .catch(error => {
                    setLoading(false);
                    let message = 'Erro ao fazer login.';
                    switch (error.code) {
                        case 'auth/user-not-found':
                            message = 'Utilizador não encontrado.';
                            break;
                        case 'auth/wrong-password':
                            message = 'Senha incorreta.';
                            break;
                        case 'auth/invalid-email':
                            message = 'Email inválido.';
                            break;
                        case 'auth/user-disabled':
                            message = 'Conta desativada.';
                            break;
                        case 'auth/too-many-requests':
                            message = 'Muitas tentativas. Tente mais tarde.';
                            break;
                        case 'auth/operation-not-supported-in-this-environment':
                            message = '⚠️ Este ambiente não suporta autenticação. Use um servidor local (Live Server).';
                            break;
                        default:
                            message = error.message;
                    }
                    showAlert('❌ ' + message, 'danger');
                });
        }

        // ==========================================
        // 🔥 LOGIN GOOGLE
        // ==========================================
        function loginGoogle() {
            showAlert('A abrir janela do Google...', 'info');

            const provider = new firebase.auth.GoogleAuthProvider();
            provider.setCustomParameters({ prompt: 'select_account' });

            auth.signInWithPopup(provider)
                .then(() => {
                    showAlert('✅ Login com Google efetuado!', 'success');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1200);
                })
                .catch(error => {
                    if (error.code === 'auth/popup-closed-by-user') {
                        showAlert('Janela de login fechada.', 'info');
                    } else if (error.code === 'auth/operation-not-supported-in-this-environment') {
                        showAlert('⚠️ Use um servidor local (Live Server) para login com Google.', 'warning');
                    } else {
                        showAlert('❌ ' + error.message, 'danger');
                    }
                });
        }

        // ==========================================
        // VERIFICAR SE JÁ ESTÁ LOGADO (com fallback)
        // ==========================================
        try {
            auth.onAuthStateChanged(user => {
                if (user) {
                    window.location.href = 'index.html';
                }
            });
        } catch (e) {
            console.warn('⚠️ Erro ao verificar estado de autenticação:', e.message);
        }
    </script>

</body>
</html>
