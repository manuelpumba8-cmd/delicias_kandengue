<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
</script>

<script>
    // ==========================================
    // AUTENTICAÇÃO
    // ==========================================
    const authSection = document.getElementById('authSection');

    auth.onAuthStateChanged(user => {
        if (!user) {
            window.location.href = 'login.html';
            return;
        }

        const displayName = user.displayName || user.email?.split('@')[0] || 'User';
        const initial = displayName.charAt(0).toUpperCase();

        document.getElementById('userName').textContent = displayName;
        document.getElementById('userEmail').textContent = user.email;
        document.getElementById('userRole').textContent = user.email === 'manuelpumba8@gmail.com' ? '👑 Administrador' :
            'Utilizador';

        // Email verificado?
        const emailStatus = document.getElementById('emailStatus');
        if (user.emailVerified) {
            emailStatus.textContent = '✅ Email verificado';
            emailStatus.className = 'badge bg-success text-light ms-2';
        } else {
            emailStatus.textContent = '⚠️ Email não verificado';
            emailStatus.className = 'badge bg-warning text-dark ms-2';
        }

        // Avatar
        const avatarText = document.getElementById('avatarText');
        const avatarImage = document.getElementById('avatarImage');
        if (user.photoURL) {
            avatarImage.src = user.photoURL;
            avatarImage.style.display = 'block';
            avatarText.style.display = 'none';
        } else {
            avatarText.textContent = initial;
            avatarText.style.display = 'block';
            avatarImage.style.display = 'none';
        }

        // Preencher formulário
        document.getElementById('perfilNome').value = displayName;
        document.getElementById('perfilEmail').value = user.email;
        document.getElementById('perfilFoto').value = user.photoURL || '';

        // Carregar histórico de orçamentos
        carregarHistoricoOrcamentos(user.uid);

        authSection.innerHTML = `
                    <div style="position: relative;">
                        <a href="#" class="user-avatar-nav" onclick="toggleProfileDropdown(event)" title="${displayName}">
                            ${user.photoURL ? `<img src="${user.photoURL}">` : initial}
                        </a>
                        <div class="profile-dropdown" id="profileDropdown">
                            <div class="dropdown-header">
                                <div class="name">${displayName}</div>
                                <div class="email">${user.email}</div>
                            </div>
                            <div class="divider"></div>
                            <a href="dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
                            <a href="perfil.html"><i class="bi bi-person"></i> Perfil</a>
                            <div class="divider"></div>
                            <a href="#" onclick="logoutUser(event)" class="logout-btn"><i class="bi bi-box-arrow-right"></i> Sair</a>
                        </div>
                    </div>
                `;
    });

    function toggleProfileDropdown(event) {
        event.preventDefault();
        event.stopPropagation();
        const dropdown = document.getElementById('profileDropdown');
        if (dropdown) dropdown.classList.toggle('show');
    }

    function logoutUser(event) {
        if (event) event.preventDefault();
        if (confirm('Tem a certeza que deseja sair?')) {
            auth.signOut().then(() => {
                showToast('Logout efetuado!', 'success');
                window.location.href = 'index.html';
            }).catch(error => {
                showToast('Erro: ' + error.message, 'error');
            });
        }
    }

    document.addEventListener('click', function(e) {
        const dropdown = document.getElementById('profileDropdown');
        const avatar = document.querySelector('.user-avatar-nav');
        if (dropdown && avatar && !avatar.contains(e.target) && !dropdown.contains(e.target)) {
            dropdown.classList.remove('show');
        }
    });

    function closeOffcanvas() {
        const offcanvas = document.getElementById('offcanvasNavbar');
        if (!offcanvas) return;
        if (typeof bootstrap !== 'undefined') {
            try {
                const bs = bootstrap.Offcanvas.getInstance(offcanvas);
                if (bs) { bs.hide(); return; }
                new bootstrap.Offcanvas(offcanvas).hide();
                return;
            } catch (e) {}
        }
        offcanvas.classList.remove('show');
        document.querySelectorAll('.offcanvas-backdrop').forEach(el => el.remove());
        document.body.classList.remove('offcanvas-open');
        document.body.style.overflow = '';
    }

    // ==========================================
    // TOAST
    // ==========================================
    function showToast(message, type = 'info') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `custom-toast ${type}`;
        const icons = { success: '✅', error: '❌', info: 'ℹ️' };
        toast.innerHTML = `
                    <span>${icons[type] || 'ℹ️'}</span>
                    <span>${message}</span>
                    <span style="cursor:pointer;margin-left:auto;font-weight:700;" onclick="this.parentElement.remove()">✕</span>
                `;
        container.appendChild(toast);
        setTimeout(() => { if (toast.parentElement) toast.remove(); }, 5000);
    }

    // ==========================================
    // ATUALIZAR PERFIL
    // ==========================================
    document.getElementById('perfilForm')?.addEventListener('submit', function(e) {
        e.preventDefault();

        const nome = document.getElementById('perfilNome').value.trim();
        const foto = document.getElementById('perfilFoto').value.trim();

        if (!nome) {
            showToast('Por favor, insira um nome.', 'error');
            return;
        }

        const user = auth.currentUser;
        if (!user) return;

        user.updateProfile({
            displayName: nome,
            photoURL: foto || null
        }).then(() => {
            database.ref('users/' + user.uid + '/name').set(nome);
            if (foto) {
                database.ref('users/' + user.uid + '/photoURL').set(foto);
            }
            showToast('✅ Perfil atualizado com sucesso!', 'success');
            setTimeout(() => location.reload(), 1000);
        }).catch(error => {
            showToast('❌ Erro: ' + error.message, 'error');
        });
    });

    // ==========================================
    // ALTERAR SENHA
    // ==========================================
    document.getElementById('senhaForm')?.addEventListener('submit', function(e) {
        e.preventDefault();

        const atual = document.getElementById('senhaAtual').value;
        const nova = document.getElementById('novaSenha').value;
        const confirmar = document.getElementById('confirmarSenha').value;

        if (!atual || !nova || !confirmar) {
            showToast('Preencha todos os campos.', 'error');
            return;
        }

        if (nova.length < 6) {
            showToast('A nova senha deve ter pelo menos 6 caracteres.', 'error');
            return;
        }

        if (nova !== confirmar) {
            showToast('As senhas não coincidem.', 'error');
            return;
        }

        const user = auth.currentUser;
        if (!user) return;

        const credential = firebase.auth.EmailAuthProvider.credential(user.email, atual);

        user.reauthenticateWithCredential(credential).then(() => {
            return user.updatePassword(nova);
        }).then(() => {
            showToast('✅ Senha alterada com sucesso!', 'success');
            document.getElementById('senhaForm').reset();
        }).catch(error => {
            if (error.code === 'auth/wrong-password') {
                showToast('❌ Senha atual incorreta.', 'error');
            } else {
                showToast('❌ Erro: ' + error.message, 'error');
            }
        });
    });

    // ==========================================
    // HISTÓRICO DE ORÇAMENTOS
    // ==========================================
    function carregarHistoricoOrcamentos(userId) {
        const container = document.getElementById('historicoOrcamentos');

        database.ref('orcamentos').orderByChild('userId').equalTo(userId).once('value').then(snapshot => {
            const orcamentos = snapshot.val();

            if (!orcamentos) {
                container.innerHTML = `
                            <div class="text-center text-muted py-4">
                                <i class="bi bi-calculator fs-1"></i>
                                <p class="mt-2">Nenhum orçamento solicitado ainda.</p>
                                <a href="orcamento.html" class="btn btn-warning btn-sm">Solicitar Orçamento</a>
                            </div>
                        `;
                return;
            }

            let html = `
                        <div class="table-responsive">
                            <table class="table table-gestao">
                                <thead>
                                    <tr>
                                        <th>Evento</th>
                                        <th>Convidados</th>
                                        <th>Data</th>
                                        <th>Status</th>
                                        <th>Resposta</th>
                                    </tr>
                                </thead>
                                <tbody>
                            `;

            Object.keys(orcamentos).forEach(key => {
                const o = orcamentos[key];
                const statusClass = o.status || 'pendente';
                const statusMap = {
                    'pendente': 'pendente',
                    'aprovado': 'aprovado',
                    'rejeitado': 'rejeitado',
                    'em-andamento': 'em-andamento'
                };

                html += `
                            <tr>
                                <td><strong>${o.tipoEvento}</strong></td>
                                <td>${o.convidados}</td>
                                <td>${o.dataEvento || 'Não definida'}</td>
                                <td><span class="status-badge ${statusMap[statusClass] || 'pendente'}">${statusClass}</span></td>
                                <td>${o.resposta ? '<span class="text-success"><i class="bi bi-check-circle"></i> Respondido</span>' : '<span class="text-muted">Aguardando</span>'}</td>
                            </tr>
                        `;
            });

            html += `
                                </tbody>
                            </table>
                        </div>
                        <div class="text-end mt-2">
                            <a href="orcamento.html" class="btn btn-warning btn-sm"><i class="bi bi-plus-circle"></i> Novo Orçamento</a>
                        </div>
                    `;

            container.innerHTML = html;
        }).catch(() => {
            container.innerHTML = `
                        <div class="text-center text-muted py-4">
                            <i class="bi bi-exclamation-triangle fs-1"></i>
                            <p class="mt-2">Erro ao carregar orçamentos.</p>
                        </div>
                    `;
        });
    }
</script>

</body>
</html>
